name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 12 */5 * *'  # every 5 days at noon UTC
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "URL is set: ${{ secrets.VITE_SUPABASE_URL != '' }}"
          echo "KEY is set: ${{ secrets.VITE_SUPABASE_ANON_KEY != '' }}"
          curl -sv \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/exercises?select=id&limit=1"
          echo "Ping complete"
